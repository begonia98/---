<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_outward" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dehaze" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=drafts" />
    <link rel="stylesheet" href="static/index.css">
    <link rel="stylesheet" href="static/bass.css">
    <link rel="stylesheet" href="static/reset.css">
    <title>Document</title>
</head>
<body>
    <!-- 遮罩使用 -->
    <div class="mask"></div>

    <!--頁首區域-->
    <header class="bg-primary-50 z-1 sticky-top">
        <nav>
            <div class="container">
                <div class="d-flex py-12 align-items-center">

                    <!--網站圖示-->
                    <a href="#">
                        <picture>
                            <source
                                srcset="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/47001d42324ec6a2c7d00cc74ea79d70c57d578a/2026-web-camp/device-mobile.svg"
                                
                                media="(max-width: 375px)" />

                             <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/47001d42324ec6a2c7d00cc74ea79d70c57d578a/2026-web-camp/device-pc.svg" 
                     alt="" />

                        </picture>
            
                    </a>

                     <!--行動版(漢堡按鈕)-->
                    <button class="menu-btn d-none d-md-block ml-auto p-12" type="button">
                        <span class="material-symbols-outlined">dehaze</span>
                    </button>
                
                    <!--導覽列清單-->
                    <ul class="nav-list label-mobile-sm d-block d-md-none ml-auto d-flex label-md text-neutral-700 gap-24 align-items-center">
                        <li class="w-md-full">
                            <a class="px-12 py-4" href="#">服務項目</a>
                        </li>
                        <li class="w-md-full">
                            <a class="px-12 py-4" href="#">專案作品</a>
                        </li>
                        <li class="w-md-full">
                            <a class="px-12 py-4" href="#">部落格</a>
                        </li>
                        <li class="w-md-full">
                            <a class="px-12 py-4" href="#">與我聯絡</a>
                        </li>
                    </ul>
                </div>
                
                </div>
        </nav>
    </header>

    <!-- Hero區域 -->
     <section class="bg-primary-50">
        <div class="container">
            <div class="d-flex text-neutral-700 flex-md-col">
                <div class="col-5 m-auto col-md-12 order-md-2">
                    <div class="d-flex">
                        <div>
                            <!--標題-->
                    <h1 class="mb-24 heading-xxxl heading-mobile-xl mb-md-12">
                        <span class="d-block ">Hello</span>
                        <span class="d-block ">I'm Nelson</span>
                    </h1>

                    <p class="paragraph-md mb-4 paragraph-mobile-sm">我是一個擁有 10 年經驗的 UIUX 設計師 和 前端工程師</p>
                    <p class="paragraph-md mb-60 paragraph-mobile-sm mb-md-32">喜歡把美學和程式結合，打造一個又一個精美的網頁設計！</p>

                    <div class="lable-md label-mobile-sm">
                        <button class="py-12 px-24 text-neutral-0 bg-neutral-700 rounded-full mr-24 mr-md-12" type="button">與我聯絡</button>
                        <button class="py-12 px-24 btn-outline rounded-full" type="button">我的履歷</button>
                    </div>
                        </div>

                    
                    </div>

                </div>

                <div class="col-7 col-md-12 order-md-1">
                    <!--圖片資訊-->
                    <div>
                        <img class="object-fit-cover"
                        src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_person.png?raw=true"
                        alt=""
                        />

                    </div>
                </div>
            </div>
        </div>
     </section>

    <!--頁尾區域-->

    <footer class="bg-primary-900 text-neutral-0 py-80">
        <div class="container">
            <div class="d-flex flex-md-col">
                <!-- 聯絡資訊區塊 -->
                <div class="col-5 col-md-12">
                    <h2 class="mb-24">
                        <span class="d-block heading-xxxs">與我聯絡</span>
                        <span class="d-block heading-xxxl">CONTACT</span>
                    </h2>

                    <p class="paragraph-md mb-4">若有數位產品設計和開發相關問題</p>
                    <p class="paragraph-md mb-92">歡迎填寫表單 或 直接與我聯絡! </p>
                    
                    <div class="d-block d-md-none">
                    
                        <!-- social icon -->
                    <div class="d-flex mb-24 gap-12">
                        <a href="#" class="p-12 rounded-full btn-outline">
                            <i class="bi bi-instagram text-24"></i>
                        </a>
                        <a href="#" class="p-12 rounded-full btn-outline">
                            <i class="bi bi-line text-24"></i>
                        </a>
                        <a href="#" class="p-12 rounded-full btn-outline">
                            <i class="bi bi-linkedin text-24"></i>
                        </a>
                    </div>

                    <!--信箱資訊-->
                    <a href="mailto:service@hexschool.com" class="d-flex gap-8">
                        <span class="material-symbols-outlined text-24">drafts</span>
                        <p class="paragraph-md">service@hexschool.com</p>
                    </a>
                    </div>
                </div>

                <!-- 聯絡資訊表格 -->
                <div class="col-7">
                    <form class="d-flex flex-wrap gap-24 px-40">
                        <input class="contact-input-half btn-outline rounded-40 px-32 py-20" type="text" placeholder="姓名" />
                        <input class="contact-input-half btn-outline rounded-40 px-32 py-20" type="tel" placeholder="手機號碼"/>
                        <input class="btn-outline rounded-40 w-full px-32 py-20" type="email" placeholder="電子信箱" />
                        <textarea class="btn-outline rounded-40 w-full px-32 py-20" rows="4" placeholder="備註"></textarea>
                        <buttom class="lable-md bg-neutral-0 text-neutral-700 py-12 w-full text-center rounded-full" type="submit">送出</buttom>
                    </form>

                </div>

                <!-- 行動裝置版本 -->
                <div class="d-none d-md-block">
                    
                        <!-- social icon -->
                    <div class="d-flex mb-24 gap-12">
                        <a href="#" class="p-12 rounded-full btn-outline">
                            <i class="bi bi-instagram text-24"></i>
                        </a>
                        <a href="#" class="p-12 rounded-full btn-outline">
                            <i class="bi bi-line text-24"></i>
                        </a>
                        <a href="#" class="p-12 rounded-full btn-outline">
                            <i class="bi bi-linkedin text-24"></i>
                        </a>
                    </div>

                    <!--信箱資訊-->
                    <a href="mailto:service@hexschool.com" class="d-flex gap-8">
                        <span class="material-symbols-outlined text-24">drafts</span>
                        <p class="paragraph-md">service@hexschool.com</p>
                    </a>
                    </div>


            </div>

        </div>
            
    </footer>

    <script src="./index.js"></script>

</body>
</html>
